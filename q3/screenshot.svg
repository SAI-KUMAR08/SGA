<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="20" y="20" width="1160" height="660" rx="12" fill="white" stroke="#cbd5e1"/>
  <text x="40" y="70" font-size="28" font-family="Arial" fill="#0f172a">Question 3 Screenshot</text>
  <text x="40" y="120" font-size="20" font-family="Arial" fill="#334155">Hard link and symbolic link behavior</text>
  <text x="40" y="175" font-size="18" font-family="Courier New" fill="#0f172a">hardlink.txt and original.txt share inode 1310805</text>
  <text x="40" y="215" font-size="18" font-family="Courier New" fill="#0f172a">symlink.txt is a separate inode pointing to original.txt</text>
  <text x="40" y="255" font-size="18" font-family="Courier New" fill="#0f172a">After deleting original.txt, hardlink.txt still works</text>
  <text x="40" y="295" font-size="18" font-family="Courier New" fill="#0f172a">symlink.txt reports No such file or directory</text>
</svg>
